# Minimal Hyprland greeter config — no HDR, no effects
monitor = DP-2, 5120x1440@240, auto, 1
monitor = DP-3, 3840x2160@144, auto-left, 1.25
monitor = , preferred, auto, 1

# Force SDR — prevent HDR blowout
env = AQ_NO_MODIFIERS,1
env = HYPRLAND_NO_SD_NOTIFY,1

exec-once = nwg-hello
exec-once = swww-daemon && sleep 1 && swww img /usr/share/pixmaps/greeter-bg.jpg --transition-type none

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
    vfr                      = true
}

render {
    cm_fs_passthrough = 0
    cm_auto_hdr       = 0
}

input {
    kb_layout    = us
    follow_mouse = 1
}

general {
    border_size = 0
    gaps_in     = 0
    gaps_out    = 0
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}
