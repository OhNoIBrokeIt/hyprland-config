# =========================================================
# KITTY CONFIG
# Colors sourced from pywal via colors-wal.conf
# =========================================================

# --- Font ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Cursor ---
cursor_shape             block
cursor_blink_interval    0
cursor_stop_blinking_after 0
shell_integration        enabled

# --- Window ---
window_padding_width     14
confirm_os_window_close  0
dynamic_background_opacity yes
background_opacity       0.88
background_blur          24
hide_window_decorations  yes

# --- Tabs ---
tab_bar_edge             top
tab_bar_style            powerline
tab_powerline_style      slanted
tab_title_template       "{title}"

# --- Bell ---
enable_audio_bell        no
visual_bell_duration     0
window_alert_on_bell     no

# --- URLs ---
detect_urls              yes
underline_hyperlinks     hover

# --- Selection ---
copy_on_select           yes
strip_trailing_spaces    smart

# --- Scrollback ---
scrollback_lines         10000
wheel_scroll_multiplier  5.0

# --- Performance ---
repaint_delay            8
input_delay              2
sync_to_monitor          yes

# --- Keybinds ---
map ctrl+shift+enter     new_window
map ctrl+shift+t         new_tab
map ctrl+shift+q         close_window
map ctrl+shift+]         next_tab
map ctrl+shift+[         previous_tab
map ctrl+shift+c         copy_to_clipboard
map ctrl+shift+v         paste_from_clipboard
map ctrl+shift+l         clear_terminal scrollback active
map ctrl+shift+h         show_scrollback

# Disable accidental font resizing
map ctrl+shift+equal     no_op
map ctrl+shift+minus     no_op
map ctrl+shift+backspace no_op

# =========================================================
# COLORS — pywal managed
# Regenerated on every wallpaper change
# Fallback dark palette if pywal hasn't run yet
# =========================================================

foreground              #d0d0d8
background              #06060c
selection_foreground    #06060c
selection_background    #00f5ff
cursor                  #00f5ff
cursor_text_color       #06060c
url_color               #00c8e0
active_border_color     #00f5ff
inactive_border_color   #1a1a2a
bell_border_color       #ff3c6f
active_tab_foreground   #06060c
active_tab_background   #00f5ff
inactive_tab_foreground #888899
inactive_tab_background #0e0e1a
tab_bar_background      #06060c

color0  #06060c
color1  #ff3c6f
color2  #00f5ff
color3  #ffd166
color4  #4d9fff
color5  #c97bff
color6  #00e5cc
color7  #d0d0d8
color8  #2a2a3a
color9  #ff6b8a
color10 #40ffff
color11 #ffe066
color12 #70b8ff
color13 #d9a0ff
color14 #40ffe0
color15 #f0f0f8

# Pywal override — loaded last so it wins
include colors-wal.conf
