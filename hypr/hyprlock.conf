# =========================================================
# HYPRLOCK — Redesigned
# Blurred screenshot background, centered card layout
# Pywal accent via $accent variable
# =========================================================

$accent     = rgba(00f5ffff)
$accentFade = rgba(00f5ff44)
$accentGlow = rgba(00f5ff22)
$surface    = rgba(08080eff)
$surfaceHi  = rgba(1a1a2eee)
$text       = rgba(f0f0f5ff)
$subtext    = rgba(c0c0cc99)
$danger     = rgba(ff3c6fff)

general {
    hide_cursor = true
    text_trim   = true
}

# =========================================================
# BACKGROUND — blurred screenshot both monitors
# =========================================================
background {
    monitor          =
    path             = screenshot
    blur_passes      = 4
    blur_size        = 8
    noise            = 0.008
    contrast         = 0.90
    brightness       = 0.65
    vibrancy         = 0.20
    vibrancy_darkness = 0.10
}

# =========================================================
# PRIMARY — DP-2 (OLED ultrawide 5120x1440)
# Layout (all centered, Y offset from center):
#   +300  clock
#   +180  date
#   +110  divider
#   +30   card background (tall)
#   +30   user label
#   -30   input field
#   -105  buttons
# =========================================================

# --- Clock ---
label {
    monitor     = DP-2
    text        = $TIME
    color       = $text
    font_size   = 120
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 300
    halign      = center
    valign      = center
    shadow_passes = 3
    shadow_size   = 12
    shadow_color  = rgba(00000080)
}

# --- Greeting ---
label {
    monitor     = DP-2
    text        = cmd[update:60000] hour=$(date +%H); if [ $hour -lt 12 ]; then echo "Good morning, William"; elif [ $hour -lt 17 ]; then echo "Good afternoon, William"; else echo "Good evening, William"; fi
    color       = $subtext
    font_size   = 18
    font_family = JetBrainsMono Nerd Font
    position    = 0, 145
    halign      = center
    valign      = center
}

# --- Date ---
label {
    monitor     = DP-2
    text        = cmd[update:60000] date '+%A, %B %d %Y'
    color       = $subtext
    font_size   = 22
    font_family = JetBrainsMono Nerd Font
    position    = 0, 105
    halign      = center
    valign      = center
    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(00000060)
}

# --- Divider ---
shape {
    monitor  = DP-2
    size     = 480, 1
    color    = $accentFade
    rounding = 2
    position = 0, 120
    halign   = center
    valign   = center
}

# --- Card ---
shape {
    monitor      = DP-2
    size         = 520, 230
    color        = $surface
    rounding     = 24
    border_size  = 1
    border_color = rgba(ffffff08)
    position     = 0, -10
    halign       = center
    valign       = center
    shadow_passes = 4
    shadow_size   = 24
    shadow_color  = rgba(00000060)
}

# --- User label ---
label {
    monitor     = DP-2
    text        =   $USER
    color       = $subtext
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position    = 0, 65
    halign      = center
    valign      = center
}

# --- Password input ---
input-field {
    monitor           = DP-2
    size              = 400, 54
    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.30
    dots_center       = true
    dots_rounding     = -1

    outer_color       = $accent
    inner_color       = rgba(0c0c18dd)
    font_color        = $text
    check_color       = $accent
    fail_color        = $danger
    fail_text         = <span foreground="##ff3c6f"> auth failed</span>
    capslock_color    = rgba(ffd166ff)
    numlock_color     = rgba(ffd166ff)

    fade_on_empty     = true
    fade_timeout      = 2000
    placeholder_text  = <span foreground="##888899">  enter password</span>
    hide_input        = false
    rounding          = 14

    position = 0, -10
    halign   = center
    valign   = center
    zindex   = 2

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(00000040)
}

# --- Buttons row ---

# Logout button
shape {
    monitor      = DP-2
    size         = 140, 44
    color        = rgba(2a2a4aee)
    border_size  = 1
    border_color = $accent
    rounding     = 14
    position     = -160, -90
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = hyprctl dispatch exit
}
label {
    monitor     = DP-2
    text        = 󰍃  Logout
    color       = $accent
    font_size   = 15
    font_family = JetBrainsMono Nerd Font
    position    = -160, -90
    halign      = center
    valign      = center
    zindex      = 3
    onclick     = hyprctl dispatch exit
}

# Suspend button
shape {
    monitor      = DP-2
    size         = 140, 44
    color        = rgba(2a2a4aee)
    border_size  = 1
    border_color = rgba(ffffff25)
    rounding     = 14
    position     = 0, -90
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = systemctl suspend
}
label {
    monitor     = DP-2
    text        = 󰤄  Suspend
    color       = $text
    font_size   = 15
    font_family = JetBrainsMono Nerd Font
    position    = 0, -90
    halign      = center
    valign      = center
    zindex      = 3
    onclick     = systemctl suspend
}

# Shutdown button
shape {
    monitor      = DP-2
    size         = 140, 44
    color        = rgba(3a1a1aee)
    border_size  = 1
    border_color = rgba(ff3c6f88)
    rounding     = 14
    position     = 160, -90
    halign       = center
    valign       = center
    zindex       = 2
    onclick      = systemctl poweroff
}
label {
    monitor     = DP-2
    text        = ⏻  Shutdown
    color       = rgba(ff3c6fff)
    font_size   = 15
    font_family = JetBrainsMono Nerd Font
    position    = 160, -90
    halign      = center
    valign      = center
    zindex      = 3
    onclick     = systemctl poweroff
}

# =========================================================
# SECONDARY — DP-3 (4K minimal — ghost clock only)
# =========================================================

label {
    monitor     = DP-3
    text        = $TIME
    color       = rgba(f0f0f515)
    font_size   = 90
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 60
    halign      = center
    valign      = center
}

label {
    monitor     = DP-3
    text        = cmd[update:60000] date '+%A, %B %d'
    color       = rgba(f0f0f50c)
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, -20
    halign      = center
    valign      = center
}
